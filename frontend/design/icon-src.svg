<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12121f"/>
      <stop offset="1" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#4f7cff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- barbell: centered within maskable safe zone -->
  <g fill="url(#bar)">
    <!-- center bar -->
    <rect x="156" y="240" width="200" height="32" rx="16"/>
    <!-- left plates -->
    <rect x="120" y="200" width="40" height="112" rx="18"/>
    <rect x="88"  y="216" width="34" height="80"  rx="16"/>
    <!-- right plates -->
    <rect x="352" y="200" width="40" height="112" rx="18"/>
    <rect x="390" y="216" width="34" height="80"  rx="16"/>
  </g>
</svg>
