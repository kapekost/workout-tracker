services:
  workout-tracker:
    # Run only — never builds here. A 1 GB Pi can't compile the Vite frontend.
    # Build + push from the Mac, then `docker compose pull` here:
    #   docker buildx build --platform linux/arm64 -t kapekost/workout-tracker:latest --push .
    # NOTE: deliberately no `build:` key, so a failed pull can't trigger an
    # on-device build that thrashes the Pi.
    image: kapekost/workout-tracker:latest
    ports:
      # host:container — 8080 avoids colliding with anything on :80 alongside Home Assistant
      - "8080:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - DATABASE_URL=/app/data/workouts.db
