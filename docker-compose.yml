services:
  workout-tracker:
    # Run only — never builds here. A 1 GB Pi can't compile the Vite frontend.
    # The image is built on the Mac and transferred straight to the Pi (no registry):
    #   docker save kapekost/workout-tracker:latest | gzip | ssh PI 'gunzip | docker load'
    # NOTE: no `build:` key (a failed pull must not trigger an on-device build),
    # and pull_policy: never (the image is loaded locally, not fetched from a registry).
    image: kapekost/workout-tracker:latest
    pull_policy: never
    ports:
      # host:container — 8080 avoids colliding with anything on :80 alongside Home Assistant
      - "8080:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - DATABASE_URL=/app/data/workouts.db
      # Session dates use local wall-clock; without this the container is UTC
      # and a workout logged after midnight local lands on the previous day.
      - TZ=Europe/London
